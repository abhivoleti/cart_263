<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Dream3</title>
  <style>
    html, body {
      margin: 0; padding: 0;
      width: 100%; height: 100%;
      overflow: hidden;
      background: #000000;
    }
    #wrap {
      width: 100vw; height: 100vh;
      overflow: hidden; position: relative;
    }
    #c { display: block; width: 100%; height: 100%; }
  </style>
</head>
<body>

  <script>
  // Resume audio in case autoplay was blocked
  window.addEventListener('load', () => {
    const bgm = window.parent.document.getElementById('bgm');
    if (bgm && bgm.paused) bgm.play();
  });
</script>
<div id="wrap">
  <canvas id="c"></canvas>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.164.1/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.164.1/examples/jsm/"
  }
}
</script>


<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { DRACOLoader } from 'three/addons/loaders/DRACOLoader.js';


const wrap   = document.getElementById('wrap');
const canvas = document.getElementById('c');

const renderer = new THREE.WebGLRenderer({canvas, antialias:true});
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setClearColor(0x000000);
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 0.19;
renderer.shadowMap.enabled = true;

const scene = new THREE.Scene();
// scene.fog = new THREE.Fog(0x000000, 10, 15);

const cam = new THREE.PerspectiveCamera(70, 1, 0.1, 100);

function resize(){
  const w = wrap.clientWidth, h = wrap.clientHeight;
  renderer.setSize(w, h, false);
  cam.aspect = w / h;
  cam.updateProjectionMatrix();
}
resize();
window.addEventListener('resize', resize);

// ── Lights ──────────────────────────────────────────────────────────────────
scene.add(new THREE.AmbientLight(0xffffff, 1.15));

const ambient = new THREE.AmbientLight(0xffffff, 0.25);
scene.add(ambient);

const dl = new THREE.DirectionalLight(0xffffff, 0.6);
dl.position.set(2, 4, 3);
scene.add(dl);
// ── Room ────────────────────────────────────────────────────────────────────
const ROOM_LEN = 40;
const TILE     = 1.5;
const HALF     = 6;

function makeGridLines(y, color){
  const group = new THREE.Group();
  const mat = new THREE.LineBasicMaterial({color, transparent:true, opacity:0.35});
  for(let i = -Math.round(HALF/TILE); i <= Math.round(HALF/TILE); i++){
    const x = i * TILE;
    group.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints([
      new THREE.Vector3(x, y, 0), new THREE.Vector3(x, y, -ROOM_LEN)
    ]), mat));
  }
  for(let z = 0; z >= -ROOM_LEN; z -= TILE){
    group.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints([
      new THREE.Vector3(-HALF, y, z), new THREE.Vector3(HALF, y, z)
    ]), mat));
  }
  return group;
}
scene.add(makeGridLines(-HALF/2, 0xFFFFFF));
scene.add(makeGridLines( HALF/2, 0xFFFFFF));

function makeWallGrid(isLeft, color){
  const g   = new THREE.Group();
  const mat = new THREE.LineBasicMaterial({color, transparent:true, opacity:0.22});
  const x   = isLeft ? -HALF : HALF;
  for(let z = 0; z >= -ROOM_LEN; z -= TILE){
    g.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints([
      new THREE.Vector3(x, -HALF/2, z), new THREE.Vector3(x, HALF/2, z)
    ]), mat));
  }
  for(let y = -HALF/2; y <= HALF/2; y += TILE){
    g.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints([
      new THREE.Vector3(x, y, 0), new THREE.Vector3(x, y, -ROOM_LEN)
    ]), mat));
  }
  return g;
}
scene.add(makeWallGrid(true,  0xFFFFFF));
scene.add(makeWallGrid(false, 0xFFFFFF));

// End wall
const endWall = new THREE.Mesh(
  new THREE.PlaneGeometry(HALF * 2, HALF),
  new THREE.MeshBasicMaterial({color: 0x000000, side: THREE.DoubleSide})
);
endWall.position.set(0, 0, -ROOM_LEN);
scene.add(endWall);

const ewMat = new THREE.LineBasicMaterial({color:0xFFFFFF, transparent:true, opacity:1});
for(let x = -HALF; x <= HALF; x += TILE){
  scene.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints([
    new THREE.Vector3(x, -HALF/2, -ROOM_LEN), new THREE.Vector3(x, HALF/2, -ROOM_LEN)
  ]), ewMat));
}
for(let y = -HALF/2; y <= HALF/2; y += TILE){
  scene.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints([
    new THREE.Vector3(-HALF, y, -ROOM_LEN), new THREE.Vector3(HALF, y, -ROOM_LEN)
  ]), ewMat));
}

// ── Constants ────────────────────────────────────────────────────────────────
const WALK_SPEED   = 0.58;
const CHAR_START_Z = -24;
const CHAR_STOP_Z  = -(ROOM_LEN);
const CHAR_Y       = -HALF / 3.5;
const CHAR_X       = 1.9;
const CAM_OFFSET_Z = 12.2;
const CAM_Y        = 0;

// Pre-position camera directly behind where the character will spawn
cam.position.set(0, CAM_Y, CHAR_START_Z + CAM_OFFSET_Z);
cam.rotation.order = 'YXZ';
// Default rotation looks straight down -Z, which is where character walks
cam.rotation.set(0, 0, 0);

// ── State ────────────────────────────────────────────────────────────────────
let mixer        = null;
let character    = null;
const tvMixers = [];
let charStopped  = false;
let camFollowing = false;
let clock        = new THREE.Clock();

setTimeout(() => { camFollowing = true; }, 2000);

// ── Character loader ─────────────────────────────────────────────────────────
// ── Draco setup ──────────────────────────────────────────────────────────────
const dracoLoader = new DRACOLoader();
dracoLoader.setDecoderPath('https://www.gstatic.com/draco/versioned/decoders/1.5.6/');

const loader = new GLTFLoader();
loader.setDRACOLoader(dracoLoader);


loader.load(
  'assets/char3.glb',
  function(gltf){
    

    // 👇 PUT IT HERE
    gltf.scene.traverse((child) => {
      if (child.isMesh) {
        console.log(child.material);
      }
    });

    character = gltf.scene;
    character.scale.setScalar(6);
    character.rotation.y = Math.PI;
    character.position.set(CHAR_X, CHAR_Y, CHAR_START_Z);
    scene.add(character);

    mixer = new THREE.AnimationMixer(character);
    const clip = THREE.AnimationClip.findByName(gltf.animations, 'rigAction') || gltf.animations[0];
    if(clip){
      const action = mixer.clipAction(clip);
      action.play();
    }
  }
);

// ── TV loader ────────────────────────────────────────────────────────────────
const loader2 = new GLTFLoader();

loader2.load('assets/tv1.glb', function(gltf){

    const tv = gltf.scene;

gltf.scene.traverse((child) => {
  if (child.isMesh) {
    console.log(child.name);
  }
});
    tv.rotation.y = Math.PI;
    tv.scale.setScalar(6);
    tv.traverse((child) => {
  console.log(child.name, child.position, child.rotation, child.scale);
});

    tv.position.set(0, CHAR_Y, -ROOM_LEN);
    tv.position.z += 0.1;
    scene.add(tv);
    if(gltf.animations.length > 0){
      const m = new THREE.AnimationMixer(tv);
      m.clipAction(gltf.animations[0]).play();
      tvMixers.push(m);
    }
  },
  null,
  err => console.error('tv.glb:', err)
);

// ── Mouse / touch look ───────────────────────────────────────────────────────
let yaw = 0, pitch = 0;
let isDrag = false, lx = 0, ly = 0;

wrap.addEventListener('mousedown', e=>{ isDrag=true; lx=e.clientX; ly=e.clientY; });
window.addEventListener('mouseup',  ()=>isDrag=false);
window.addEventListener('mousemove', e=>{
  if(!isDrag) return;
  yaw   -= (e.clientX-lx)*0.003;
  pitch -= (e.clientY-ly)*0.003;
  pitch  = Math.max(-0.4, Math.min(0.4, pitch));
  lx=e.clientX; ly=e.clientY;
});

let tx2=0, ty2=0;
wrap.addEventListener('touchstart', e=>{ tx2=e.touches[0].clientX; ty2=e.touches[0].clientY; },{passive:true});
wrap.addEventListener('touchmove', e=>{
  e.preventDefault();
  const dx=e.touches[0].clientX-tx2, dy=e.touches[0].clientY-ty2;
  yaw   -= dx*0.003;
  pitch -= dy*0.003;
  pitch  = Math.max(-0.4, Math.min(0.4, pitch));
  tx2=e.touches[0].clientX; ty2=e.touches[0].clientY;
},{passive:false});

// ── Animate ──────────────────────────────────────────────────────────────────
function animate(){
  requestAnimationFrame(animate);
  const delta = clock.getDelta();

  if(character){
    if(!charStopped){
      character.position.z -= WALK_SPEED * delta;
      if(character.position.z <= CHAR_STOP_Z*1.291){
        character.position.z = CHAR_STOP_Z*1.291;
        charStopped = true;
      }
    }

    if(camFollowing){
      const targetZ = character.position.z + CAM_OFFSET_Z;
      cam.position.z += (targetZ - cam.position.z) * 0.08;
      cam.position.x = 0;
      cam.position.y = CAM_Y;
    }
  }

  // Pure rotation — yaw=0, pitch=0 naturally looks down -Z (toward character)
  // NO lookAt — that was fighting the manual rotation and causing the offset
  // cam.rotation.y = yaw;
  // cam.rotation.x = pitch;

  if(mixer) mixer.update(delta);
  tvMixers.forEach(m => m.update(delta));

  renderer.render(scene, cam);
  
}
animate();
</script>
</body>
</html>
