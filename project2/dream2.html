<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>dream2</title>
  <style>
    * { box-sizing: border-box; }
    html, body { width: 100%; height: 100%; margin: 0; padding: 0; overflow: hidden; background: #000; }
    canvas { display: block; }


.rever {
  position: fixed;
  top: 57%;
  left: 55%;
  transform: translate(-50%, -50%);
  font-family: 'Andale Mono', monospace;
  font-size: 96px;
  color: white;
  text-shadow: 0 0 20px rgba(0,0,0,0.1);
  opacity: 0;
  transition: opacity 6s ease;
  z-index: 9998;
  pointer-events: none;
}

#rever1 { letter-spacing: 2.3em; }
#rever2, #rever3, #rever4 { letter-spacing: 0.4em; font-size: 22px; white-space: nowrap; top: 75%;left: 50%; }
</style>

  </style>
</head>
<body>
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.164.1/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.164.1/examples/jsm/"
  }
}
</script>

 <script>

const bgm = window.parent.document.getElementById('bgm');

  window.addEventListener('load', () => {
    bgm = window.parent.document.getElementById('bgm');
    if (bgm && bgm.paused) bgm.play();
  });
  
  document.addEventListener("keydown", (event) => {
  if (event.code === "Space") {
    setTimeout(() => { 
       
window.parent.document.getElementById('frame').src = "dream3.html";
    }, 200);
  }

});

</script>
  </head>
  <body style="background-color: black;">

    <div id="fade"></div>

<div class="rever" id="rever1">Scene2</div>
<div class="rever" id="rever2">Do you ever feel like your life's a dream?</div>
<div class="rever" id="rever3">Where vivid daydreams blur into waking reality?</div>
<div class="rever" id="rever4">And you drift without choosing where you go?</div>

<script>
  const revers = [
  { id: 'rever1', delay: 1000,  visible: 3000 },
  { id: 'rever2', delay: 8000,  visible: 5000 },
  { id: 'rever3', delay: 15000, visible: 5000 },
  { id: 'rever4', delay: 22000, visible: 5000 },
];

revers.forEach(({ id, delay, visible }) => {
  const el = document.getElementById(id);
  setTimeout(() => {
    el.style.opacity = '1';
    setTimeout(() => {
      el.style.opacity = '0';
    }, visible);
  }, delay);
});
</script>

  </body>
<script type="module">
import * as THREE from 'three';
import { OrbitControls }   from 'three/addons/controls/OrbitControls.js';
import { Sky }             from 'three/addons/objects/Sky.js';
import { GLTFLoader }      from 'three/addons/loaders/GLTFLoader.js';
import { DRACOLoader } from 'three/addons/loaders/DRACOLoader.js';
import { EffectComposer }  from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass }      from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

  const fadeOverlay=document.getElementById("fade"); 


fadeOverlay.style.position = "fixed";
fadeOverlay.style.top = "0";
fadeOverlay.style.left = "0";
fadeOverlay.style.width = "100vw";
fadeOverlay.style.height = "100vh";

fadeOverlay.style.background = "white";
fadeOverlay.style.opacity = "1";
fadeOverlay.style.pointerEvents = "none";
fadeOverlay.style.zIndex = "9999";

fadeOverlay.style.transition = "opacity 3s ease";

// add to page
document.body.appendChild(fadeOverlay);

// trigger fade after a short delay (or call whenever you want)
setTimeout(() => {
  fadeOverlay.style.opacity = "0";
}, 200);

// Sun parameters
const SUN_PARAMS = {
  elevation: 16,
  azimuth:   180,
  exposure:  .2,
};

// Renderer 
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = SUN_PARAMS.exposure;
renderer.shadowMap.enabled = true;
document.body.appendChild(renderer.domElement);

//  Scene & Camera 
const scene  = new THREE.Scene();
scene.fog    = new THREE.FogExp2(0x90c060, 0.000901);
const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 10000);
camera.position.set(-272, 160, 450);
camera.lookAt(0, 40, 0);

//Bloom
const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));
composer.addPass(new UnrealBloomPass(
  new THREE.Vector2(window.innerWidth, window.innerHeight),
  0.4, 0.04, 0.9
));

// Sky 
const sky = new Sky();
sky.scale.setScalar(10000);
scene.add(sky);
const skyU = sky.material.uniforms;
skyU['turbidity'].value       = 4;
skyU['rayleigh'].value        = 3.0;
skyU['mieCoefficient'].value  = 0.005;
skyU['mieDirectionalG'].value = 0.781;

const sun = new THREE.Vector3();
const pmrem = new THREE.PMREMGenerator(renderer);
let envRT;

function updateSun() {
  const phi   = THREE.MathUtils.degToRad(90 - SUN_PARAMS.elevation);
  const theta = THREE.MathUtils.degToRad(SUN_PARAMS.azimuth);
  sun.setFromSphericalCoords(1, phi, theta);
  skyU['sunPosition'].value.copy(sun);
  if (envRT) envRT.dispose();
  const envScene = new THREE.Scene();
  envScene.add(sky.clone());
  envRT = pmrem.fromScene(envScene);
  scene.environment = envRT.texture;
  renderer.toneMappingExposure = SUN_PARAMS.exposure;
}
updateSun();

//Lighting 
scene.add(new THREE.AmbientLight(0xc8e8a0, 0.9));
const dirLight = new THREE.DirectionalLight(0xffe8a0, 1.8);
dirLight.position.set(300, 200, 100);
dirLight.castShadow = true;
scene.add(dirLight);

//ground
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(10000, 10000, 10, 10),
  new THREE.MeshLambertMaterial({ color: 0x2a5010 })
);
ground.rotation.x = -Math.PI / 2;
ground.receiveShadow = true;

// height variation
const gPos = ground.geometry.attributes.position;
for (let i = 0; i < gPos.count; i++) {
  const x = gPos.getX(i);
  const z = gPos.getY(i);
  gPos.setZ(i,
    Math.sin(x * 0.008) * 3 +
    Math.cos(z * 0.006) * 2 +
    Math.sin(x * 0.03 + z * 0.02) * 0.8
  );
}
gPos.needsUpdate = true;
ground.geometry.computeVertexNormals();
scene.add(ground);

// grass blades
const BLADE_COUNT  = 800000;
const BLADE_SEGS   = 5;
const BLADE_VERTS  = (BLADE_SEGS + 1) * 2;
const BLADE_INDICES= BLADE_SEGS * 6;
const SPREAD       = 4000;

const positions  = new Float32Array(BLADE_COUNT * BLADE_VERTS * 3);
const uvs        = new Float32Array(BLADE_COUNT * BLADE_VERTS * 2);
const indices    = new Uint32Array(BLADE_COUNT * BLADE_INDICES);
const bladeData  = new Float32Array(BLADE_COUNT * 4);

const bladeX     = new Float32Array(BLADE_COUNT * BLADE_VERTS);
const bladeZ     = new Float32Array(BLADE_COUNT * BLADE_VERTS);
const bladePhase = new Float32Array(BLADE_COUNT * BLADE_VERTS);
const bladeH     = new Float32Array(BLADE_COUNT * BLADE_VERTS);

let vIdx = 0, iIdx = 0;

for (let b = 0; b < BLADE_COUNT; b++) {
  const angle  = Math.random() * Math.PI * 2;
  const radius = Math.sqrt(Math.random()) * SPREAD;
  const bx     = Math.cos(angle) * radius;
  const bz     = Math.sin(angle) * radius;
  const height = 15 + Math.random() * 25;  
  const width  = 1.5 + Math.random() * 2.0;
  const lean   = (Math.random() - 0.5) * 5;
  const phase  = Math.random() * Math.PI * 2;
  const facing = Math.random() * Math.PI;
  const cf     = Math.cos(facing);
  const sf     = Math.sin(facing);

  bladeData[b * 4]     = bx;
  bladeData[b * 4 + 1] = bz;
  bladeData[b * 4 + 2] = phase;
  bladeData[b * 4 + 3] = height;

  const baseVert = vIdx / 3;

  for (let s = 0; s <= BLADE_SEGS; s++) {
    const t  = s / BLADE_SEGS;
    const y  = t * height;
    const hw = width * (1 - t * 0.8);
    const lx = lean * t * t;

    const lxw = lx - hw;
    positions[vIdx    ] = bx + cf * lxw;
    positions[vIdx + 1] = y;
    positions[vIdx + 2] = bz + sf * lxw;
    uvs[(vIdx/3)*2    ] = 0;
    uvs[(vIdx/3)*2 + 1] = t;
    vIdx += 3;

    const rxw = lx + hw;
    positions[vIdx    ] = bx + cf * rxw;
    positions[vIdx + 1] = y;
    positions[vIdx + 2] = bz + sf * rxw;
    uvs[(vIdx/3)*2    ] = 1;
    uvs[(vIdx/3)*2 + 1] = t;
    vIdx += 3;

    if (s < BLADE_SEGS) {
      const bl = baseVert + s * 2;
      indices[iIdx++] = bl;     indices[iIdx++] = bl+1; indices[iIdx++] = bl+2;
      indices[iIdx++] = bl+1;   indices[iIdx++] = bl+3; indices[iIdx++] = bl+2;
    }
  }

  const start = b * BLADE_VERTS;
  for (let v = 0; v < BLADE_VERTS; v++) {
    bladeX    [start + v] = bx;
    bladeZ    [start + v] = bz;
    bladePhase[start + v] = phase;
    bladeH    [start + v] = height;
  }
}

const geo = new THREE.BufferGeometry();
geo.setAttribute('position',   new THREE.BufferAttribute(positions,  3));
geo.setAttribute('uv',         new THREE.BufferAttribute(uvs,        2));
geo.setAttribute('bladeX',     new THREE.BufferAttribute(bladeX,     1));
geo.setAttribute('bladeZ',     new THREE.BufferAttribute(bladeZ,     1));
geo.setAttribute('bladePhase', new THREE.BufferAttribute(bladePhase, 1));
geo.setAttribute('bladeH',     new THREE.BufferAttribute(bladeH,     1));
geo.setIndex(new THREE.BufferAttribute(indices, 1));
geo.computeVertexNormals();

const grassMat = new THREE.ShaderMaterial({
  uniforms: {
    time:      { value: 0 },
    windDir:   { value: new THREE.Vector2(1.0, 0.5) },
    windSpeed: { value: 0.8 },
    windWave:  { value: 0.003 },
    windStr:   { value: 12.0 },
  },
  vertexShader: `
    attribute float bladeX;
    attribute float bladeZ;
    attribute float bladePhase;
    attribute float bladeH;
    uniform float time;
    uniform vec2  windDir;
    uniform float windSpeed;
    uniform float windWave;
    uniform float windStr;
    varying float vT;
    varying float vNoise;
    float hash(vec2 p) {
      return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453);
    }
    void main() {
      vT = uv.y;
      float wave = sin(
        (bladeX * windDir.x + bladeZ * windDir.y) * windWave
        + time * windSpeed + bladePhase
      );
      float gust = sin(
        (bladeX * windDir.x + bladeZ * windDir.y) * windWave * 0.3
        + time * windSpeed * 0.4 + bladePhase * 0.7
      ) * 0.5;
      float totalWind = (wave + gust) * windStr;
      float t3 = vT * vT * vT;
      vec3 pos = position;
      pos.x += windDir.x * totalWind * t3;
      pos.z += windDir.y * totalWind * t3 * 0.5;
      pos.y -= abs(totalWind) * t3 * 0.04;
      vNoise = hash(vec2(bladeX, bladeZ));
      gl_Position = projectionMatrix * modelViewMatrix * vec4(pos, 1.0);
    }`,
  fragmentShader: `
    varying float vT;
    varying float vNoise;
    void main() {
      vec3 base = vec3(0.03, 0.16, 0.02);
      vec3 mid  = vec3(0.10, 0.42, 0.06);
      vec3 tip  = vec3(0.35, 0.75, 0.18);
      mid += vec3(-0.02, vNoise * 0.08, -0.01);
      tip += vec3(-0.01, vNoise * 0.06,  0.01);
      vec3 col = vT < 0.5
        ? mix(base, mid, vT * 2.0)
        : mix(mid,  tip, (vT - 0.5) * 2.0);
      col *= 0.7 + vT * 0.5;
      gl_FragColor = vec4(col, 1.0);
    }`,
  side: THREE.DoubleSide,
});

scene.add(new THREE.Mesh(geo, grassMat));


// character
let mixer = null;
let characterModel = null;
const clock = new THREE.Clock(false);
const WALK_SPEED = 0.55;

const dracoLoader = new DRACOLoader();
dracoLoader.setDecoderPath('https://www.gstatic.com/draco/versioned/decoders/1.5.6/');




const loader = new GLTFLoader();
loader.setDRACOLoader(dracoLoader);
loader.load(
  'assets/char4.glb',
  gltf => {
    const model = gltf.scene;
    
    console.log('Animations found:', gltf.animations.map(a => a.name));
    model.rotation.y = Math.PI ;

    const box    = new THREE.Box3().setFromObject(model);
    const center = box.getCenter(new THREE.Vector3());
    const size   = box.getSize(new THREE.Vector3());

    model.position.set(-center.x, -box.min.y, -box.min.z);

    const scaleFactor = 90 / size.x;
    model.scale.setScalar(scaleFactor);

    const box2 = new THREE.Box3().setFromObject(model);
    model.position.y = -box2.min.y  ;
    model.position.z = -box2.min.z ;

    if (gltf.animations.length > 0) {
      mixer = new THREE.AnimationMixer(model);
      const clip   = THREE.AnimationClip.findByName(gltf.animations, 'rigAction');
      const action = mixer.clipAction(clip);
      action.reset();
      action.setLoop(THREE.LoopRepeat, Infinity);
      action.timeScale = 1;
      action.enabled = true;
      action.play();
      console.log('Playing:', clip.name, '| Duration:', clip.duration);
    }

    characterModel = model;
    clock.start();
    scene.add(model);

model.traverse(child => {
  if (child.isMesh) {
    const oldMat = child.material;
    child.material = new THREE.MeshStandardMaterial({
      map:              oldMat.map          ?? null,
      color:            oldMat.color        ?? new THREE.Color(1, 1, 1),
      normalMap:        oldMat.normalMap    ?? null,
      roughness:        0.8,
      metalness:        0.1,
    });
    child.castShadow    = true;
    child.receiveShadow = true;
    oldMat.dispose();
  }
});
    
  },
  xhr => console.log(`char4.glb: ${(xhr.loaded / xhr.total * 100).toFixed(0)}% loaded`),
  err => console.error('GLB load error:', err)
);

// orbital controls
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.target.set(-270.6, 153.6, 90);
controls.maxPolarAngle = Math.PI * 0.48;
controls.minDistance   = 50;
controls.maxDistance   = 2000;
controls.update();
controls.enabled = false;

// After controls.update();
controls.addEventListener('change', () => {
  console.log('Camera pos:', camera.position.x.toFixed(1), camera.position.y.toFixed(1), camera.position.z.toFixed(1));
  console.log('Camera target:', controls.target.x.toFixed(1), controls.target.y.toFixed(1), controls.target.z.toFixed(1));
});


window.addEventListener('keydown', e => {
  if (e.key === 'l' || e.key === 'L') {
    console.log('DirLight pos:', dirLight.position.x.toFixed(1), dirLight.position.y.toFixed(1), dirLight.position.z.toFixed(1));
    console.log('Camera pos:', camera.position.x.toFixed(1), camera.position.y.toFixed(1), camera.position.z.toFixed(1));
    console.log('Camera target:', controls.target.x.toFixed(1), controls.target.y.toFixed(1), controls.target.z.toFixed(1));
  }
});

// resize 
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
  composer.setSize(window.innerWidth, window.innerHeight);
});

// animation loop 
function animate() {
  requestAnimationFrame(animate);
  const delta = clock.getDelta();

  if (mixer) mixer.update(delta);
  if (characterModel) characterModel.position.z -= WALK_SPEED;

  const t = performance.now() * 0.001;
  grassMat.uniforms.time.value = t;
  const wd = grassMat.uniforms.windDir.value;
  wd.x = Math.cos(t * 0.05);
  wd.y = Math.sin(t * 0.05);

  controls.update();
  composer.render();
}
animate();
</script>
</body>
