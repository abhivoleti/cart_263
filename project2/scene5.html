 <script>
  const fadeOverlay=document.getElementById("fade"); 
  document.addEventListener("keydown", (event) => {

    if (event.code === "Space") {
    window.location.href = "scene6.html";
  }
}); 

let playing = false; 

async function playMelody() {

  // FX
  const reverb = new Tone.Reverb({
    decay: 5,
    wet: 0.5
  }).toDestination();

  // sawtooth pad synth 
  const chordSynth = new Tone.PolySynth(Tone.Synth, {
    oscillator: { type: "sawtooth" },
    envelope: {
      attack: 1.5,
      decay: 0.5,
      sustain: 0.4,
      release:1.5
    },
    volume: -12
  }).connect(reverb);

  //arpeggio sine 
  const arpSynth = new Tone.Synth({
    oscillator: { type: "sine" },
    envelope: {
      attack: 0.01,
      decay: 0.3,
      sustain: 0.1,
      release: 0.3
    }
  }).connect(reverb);

  // chord progression (i googled these)
  const chords = [
    ["C4", "E4", "G4", "B4"],   // Cmaj7
    ["A3", "C4", "E4", "G4"],   // Am7
    ["F3", "A3", "C4", "E4"],   // Fmaj7
    ["G3", "B3", "D4", "F4"]    // G7
  ];

  let currentChord = chords[0];

  // chords, pad 
  const chordLoop = new Tone.Loop((time) => {
    currentChord = chords[Math.floor(Math.random() * chords.length)];

    chordSynth.triggerAttackRelease(currentChord, "2m", time);
  }, "2m").start(0);

  // arppegio 
  const arpLoop = new Tone.Loop((time) => {
    const note = currentChord[Math.floor(Math.random() * currentChord.length)];

    // optional: jump up an octave sometimes
    const octaveUp = Math.random() > 0.5;
    const finalNote = octaveUp
      ? Tone.Frequency(note).transpose(12)
      : note;

    arpSynth.triggerAttackRelease(finalNote, "8n", time);
  }, "8n").start(0);

  Tone.Transport.start();
}

// click to start audio
document.addEventListener("click", async () => {
  if (!playing) {
    await Tone.start();
    playMelody();
    playing = true;
  }
});

 </script>
